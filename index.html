<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>百八拜</title>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="百八拜"/>
<meta name="theme-color" content="#1A1A18"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#1A1A18;overflow:hidden}
body{font-family:Georgia,'Batang',serif;color:#F2EDE4;user-select:none;-webkit-user-select:none}
#app{height:100%;display:flex;flex-direction:column;align-items:center;max-width:400px;margin:0 auto;position:relative}

/* 탭 */
#tabs{width:100%;display:flex;border-bottom:1px solid rgba(242,237,228,0.06);flex-shrink:0;background:#1A1A18;position:relative;z-index:10}
.tab-btn{flex:1;padding:18px 0;background:none;border:none;border-bottom:1px solid transparent;margin-bottom:-1px;color:#6B6B60;font-size:11px;letter-spacing:.3em;font-family:'Helvetica Neue',sans-serif;font-weight:300;cursor:pointer;transition:all .3s}
.tab-btn.active{color:#F2EDE4;font-size:12px;font-weight:400;border-bottom:1px solid rgba(201,75,58,0.6)}

/* 패널 */
#counter-panel,#calendar-panel{flex:1;width:100%;overflow-y:auto;overflow-x:hidden}
#counter-panel{display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:28px 24px 32px}
#calendar-panel{padding:24px 20px 40px;display:none}

/* 상단 */
#top-area{display:flex;flex-direction:column;align-items:center;gap:12;width:100%}
#session-text{font-size:13px;color:#6B6B60;letter-spacing:.15em;font-family:'Helvetica Neue',sans-serif;font-weight:300;text-align:center}
#bgm-bar{display:flex;align-items:center;gap:12px;margin-top:10px}
#bgm-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid rgba(242,237,228,0.1);border-radius:20px;padding:5px 12px;cursor:pointer;transition:all .3s;color:#6B6B60;font-size:10px;letter-spacing:.2em;font-family:'Helvetica Neue',sans-serif;font-weight:300}
#bgm-toggle.on{background:rgba(143,168,154,0.12);border-color:rgba(143,168,154,0.35);color:#8FA89A}
#bgm-toggle span.note{font-size:13px}
#vol-wrap{display:flex;align-items:center;gap:6px;opacity:0;pointer-events:none;transition:opacity .3s}
#vol-wrap.show{opacity:1;pointer-events:auto}
#vol-slider{width:72px;accent-color:#8FA89A;cursor:pointer}

/* 원형 */
#circle-wrap{position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
#circle-wrap.done{cursor:default}
#main-svg{display:block}
#center-text{position:absolute;text-align:center;pointer-events:none}
#count-num{font-size:64px;color:#F2EDE4;line-height:1;font-weight:400;transition:transform .15s ease}
#count-num.pulse{transform:scale(0.95)}
#count-sub{font-size:12px;color:#6B6B60;letter-spacing:.25em;font-family:'Helvetica Neue',sans-serif;font-weight:300;margin-top:4px}
#ready-num{font-size:72px;color:#C94B3A;line-height:1;font-weight:200;font-family:'Helvetica Neue',sans-serif}
#ready-label{font-size:11px;color:#6B6B60;letter-spacing:.3em;font-family:'Helvetica Neue',sans-serif;font-weight:300;margin-top:8px}
#done-label{font-size:15px;color:#8FA89A;letter-spacing:.2em;font-family:'Helvetica Neue',sans-serif;font-weight:300}
#done-num{font-size:52px;color:#F2EDE4;line-height:1;font-weight:400;margin-top:6px}
#ripple-ring{position:absolute;width:260px;height:260px;border-radius:50%;border:1.5px solid rgba(201,75,58,0.5);animation:rippleOut .6s ease-out forwards;pointer-events:none}
@keyframes rippleOut{from{transform:scale(1);opacity:1}to{transform:scale(1.4);opacity:0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* 마일스톤 */
#milestone-msg{height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#C94B3A;letter-spacing:.3em;opacity:0;transition:opacity .4s}
#milestone-msg.show{opacity:1}

/* 타이머 */
#timer-wrap{text-align:center}
#timer-num{font-size:28px;color:rgba(107,107,96,0.4);font-family:'Helvetica Neue',monospace;font-weight:200;letter-spacing:.12em;transition:color .5s}
#timer-num.active{color:rgba(242,237,228,0.7)}
#timer-label{font-size:10px;color:#6B6B60;letter-spacing:.3em;font-family:'Helvetica Neue',sans-serif;font-weight:300;margin-top:4px}

/* 설정 패널 */
#settings-box{display:flex;flex-direction:column;align-items:center;gap:14px;padding:18px 24px;border:1px solid rgba(242,237,228,0.08);border-radius:4px;background:rgba(242,237,228,0.03);width:240px;animation:fadeIn .4s ease}
#mode-toggle{display:flex;border:1px solid rgba(242,237,228,0.12);border-radius:3px;overflow:hidden;width:100%}
.mode-btn{flex:1;padding:7px 0;background:none;border:none;color:#6B6B60;font-size:11px;letter-spacing:.2em;font-family:'Helvetica Neue',sans-serif;font-weight:300;cursor:pointer;transition:all .25s}
.mode-btn.active{background:rgba(201,75,58,0.15);color:#C94B3A}
#interval-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}
#interval-label{font-size:10px;color:#6B6B60;letter-spacing:.3em;font-family:'Helvetica Neue',sans-serif}
#interval-controls{display:flex;align-items:center;gap:16px}
.int-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(242,237,228,0.15);background:none;color:rgba(242,237,228,0.5);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
#interval-val{text-align:center;min-width:60px}
#interval-num{font-size:32px;color:#F2EDE4;font-family:'Helvetica Neue',monospace;font-weight:200}
#interval-unit{font-size:11px;color:#6B6B60;font-family:'Helvetica Neue',sans-serif;margin-left:4px}
#presets{display:flex;gap:6px}
.preset-btn{padding:4px 8px;background:none;border:1px solid rgba(242,237,228,0.1);color:#6B6B60;font-size:10px;letter-spacing:.1em;font-family:'Helvetica Neue',sans-serif;border-radius:2px;cursor:pointer;transition:all .2s}
.preset-btn.active{background:rgba(201,75,58,0.18);border-color:rgba(201,75,58,0.4);color:#C94B3A}

/* 하단 */
#bottom-area{display:flex;flex-direction:column;align-items:center;gap:16px;width:100%;max-width:260px}
#reset-btn{background:none;border:1px solid rgba(242,237,228,0.12);color:rgba(242,237,228,0.35);font-size:11px;letter-spacing:.3em;padding:10px 24px;cursor:pointer;font-family:'Helvetica Neue',sans-serif;font-weight:300;border-radius:2px;width:100%;transition:all .3s;display:none}
#progress-labels{display:flex;justify-content:space-between;width:100%;font-size:10px;color:#6B6B60;font-family:'Helvetica Neue',sans-serif;letter-spacing:.15em;font-weight:300}
#progress-track{width:100%;height:1px;background:rgba(242,237,228,0.08);position:relative}
#progress-fill{position:absolute;top:0;left:0;height:100%;width:0%;background:#C94B3A;transition:width .4s ease,background .8s ease}
.progress-mark{position:absolute;top:-3px;width:1px;height:7px;background:rgba(242,237,228,0.2);transform:translateX(-50%)}

/* 달력 */
#cal-stats{display:flex;justify-content:space-between;padding:0 4px;margin-bottom:20px}
.stat-item{text-align:center}
.stat-val{font-size:20px;color:#F2EDE4;font-family:'Helvetica Neue',sans-serif;font-weight:200;letter-spacing:.05em}
.stat-lbl{font-size:10px;color:#6B6B60;letter-spacing:.25em;font-family:'Helvetica Neue',sans-serif;margin-top:2px}
#cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav-btn{background:none;border:none;color:rgba(242,237,228,0.4);font-size:22px;cursor:pointer;padding:4px 10px}
#cal-month-label{font-size:14px;color:#F2EDE4;letter-spacing:.2em;font-family:'Helvetica Neue',sans-serif;font-weight:300}
#cal-day-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-day-name{text-align:center;font-size:10px;letter-spacing:.1em;font-family:'Helvetica Neue',sans-serif;padding-bottom:6px}
#cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 2px;border-radius:4px;border:1px solid transparent;min-height:44px;gap:4px;cursor:pointer;transition:background .2s}
.cal-cell.today{border-color:rgba(201,75,58,0.4)}
.cal-cell.done-day{background:rgba(143,168,154,0.08)}
.cal-cell.selected{background:rgba(201,75,58,0.15);border-color:rgba(201,75,58,0.3)}
.cal-cell.future{cursor:default}
.cal-num{font-size:13px;font-family:'Helvetica Neue',sans-serif;font-weight:300;color:rgba(242,237,228,0.45)}
.cal-cell.done-day .cal-num{color:#F2EDE4;font-weight:400}
.cal-cell.today .cal-num{color:#C94B3A}
.cal-cell.future .cal-num{color:rgba(107,107,96,0.25)}
.cal-dots{display:flex;gap:2px}
.cal-dot{width:4px;height:4px;border-radius:50%}
#cal-detail{margin-top:16px;padding:14px 18px;border:1px solid rgba(242,237,228,0.08);border-radius:4px;background:rgba(242,237,228,0.03);display:none;flex:row;align-items:center;justify-content:space-between;animation:fadeIn .3s ease}
#cal-detail-date{font-size:13px;color:#6B6B60;font-family:'Helvetica Neue',sans-serif;letter-spacing:.1em}
#cal-detail-val{font-size:22px;color:#8FA89A;font-family:'Helvetica Neue',sans-serif;font-weight:200}
#cal-detail-unit{font-size:11px;color:#6B6B60;font-family:'Helvetica Neue',sans-serif;margin-left:4px}
#cal-detail-empty{font-size:12px;color:rgba(107,107,96,0.5);font-family:'Helvetica Neue',sans-serif;letter-spacing:.1em}

/* 배경 */
#bg-glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(139,110,80,0.06) 0%,transparent 70%);pointer-events:none;z-index:0}
</style>
</head>
<body>
<div id="bg-glow"></div>
<div id="app">
  <!-- 탭 -->
  <div id="tabs">
    <button class="tab-btn active" onclick="switchTab('counter')">百八拜</button>
    <button class="tab-btn" onclick="switchTab('calendar')">기록</button>
  </div>

  <!-- 카운터 패널 -->
  <div id="counter-panel">
    <div id="top-area">
      <div id="session-text">오늘의 첫 번째 절</div>
      <div id="bgm-bar">
        <button id="bgm-toggle" onclick="toggleBGM()">
          <span class="note">♩</span>
          <span id="bgm-label">음악 OFF</span>
        </button>
        <div id="vol-wrap">
          <span style="font-size:10px;color:#6B6B60">🔈</span>
          <input id="vol-slider" type="range" min="0.02" max="0.4" step="0.01" value="0.18" oninput="setVolume(this.value)"/>
          <span style="font-size:10px;color:#6B6B60">🔊</span>
        </div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:28px">
      <!-- 원형 -->
      <div id="circle-wrap" onclick="handleBow()">
        <svg id="main-svg" width="280" height="280" viewBox="0 0 280 280">
          <circle cx="140" cy="140" r="110" fill="none" stroke="rgba(242,237,228,0.06)" stroke-width="1.5"/>
          <circle id="cd-arc" cx="140" cy="140" r="110" fill="none" stroke="rgba(143,168,154,0.25)" stroke-width="6" stroke-linecap="round" transform="rotate(-90 140 140)" style="display:none;transition:stroke-dashoffset .45s linear"/>
          <line id="mark36" x1="0" y1="0" x2="0" y2="0" stroke="rgba(242,237,228,0.18)" stroke-width="1"/>
          <line id="mark72" x1="0" y1="0" x2="0" y2="0" stroke="rgba(242,237,228,0.18)" stroke-width="1"/>
          <circle id="progress-arc" cx="140" cy="140" r="110" fill="none" stroke="#C94B3A" stroke-width="1.5" stroke-linecap="round" transform="rotate(-90 140 140)" style="transition:stroke-dashoffset .4s ease,stroke .8s ease"/>
        </svg>
        <div id="center-text">
          <div id="normal-view">
            <div id="count-num">0</div>
            <div id="count-sub">터치하여 시작</div>
          </div>
          <div id="ready-view" style="display:none;text-align:center">
            <div id="ready-num">5</div>
            <div id="ready-label">준비</div>
          </div>
          <div id="done-view" style="display:none;text-align:center">
            <div id="done-label">원만성취</div>
            <div id="done-num">108</div>
          </div>
        </div>
      </div>

      <div id="milestone-msg"></div>

      <div id="timer-wrap">
        <div id="timer-num">00:00</div>
        <div id="timer-label">소요 시간</div>
      </div>

      <!-- 설정 -->
      <div id="settings-box">
        <div id="mode-toggle">
          <button class="mode-btn active" onclick="setMode(false)">수동</button>
          <button class="mode-btn" onclick="setMode(true)">자동 간격</button>
        </div>
        <div id="interval-wrap" style="display:none">
          <div id="interval-label">1배 간격</div>
          <div id="interval-controls">
            <button class="int-btn" onclick="changeInterval(-0.5)">−</button>
            <div id="interval-val">
              <span id="interval-num">5</span><span id="interval-unit">초</span>
            </div>
            <button class="int-btn" onclick="changeInterval(0.5)">+</button>
          </div>
          <div id="presets">
            <button class="preset-btn" onclick="setPreset(3)">3s</button>
            <button class="preset-btn" onclick="setPreset(5)">5s</button>
            <button class="preset-btn active" onclick="setPreset(10)">10s</button>
            <button class="preset-btn" onclick="setPreset(15)">15s</button>
            <button class="preset-btn" onclick="setPreset(30)">30s</button>
          </div>
        </div>
      </div>
    </div>

    <div id="bottom-area">
      <button id="reset-btn" onclick="handleReset()">처음으로</button>
      <div id="progress-labels">
        <span>0</span><span>36</span><span>72</span><span>108</span>
      </div>
      <div id="progress-track">
        <div id="progress-fill"></div>
        <div class="progress-mark" style="left:33.33%"></div>
        <div class="progress-mark" style="left:66.66%"></div>
      </div>
    </div>
  </div>

  <!-- 달력 패널 -->
  <div id="calendar-panel">
    <div id="cal-stats">
      <div class="stat-item"><div class="stat-val" id="st-month">0일</div><div class="stat-lbl">이번 달</div></div>
      <div class="stat-item"><div class="stat-val" id="st-streak">0일</div><div class="stat-lbl">연속</div></div>
      <div class="stat-item"><div class="stat-val" id="st-total">0회</div><div class="stat-lbl">누적</div></div>
    </div>
    <div id="cal-nav">
      <button class="cal-nav-btn" onclick="calPrev()">‹</button>
      <div id="cal-month-label"></div>
      <button class="cal-nav-btn" id="cal-next-btn" onclick="calNext()">›</button>
    </div>
    <div id="cal-day-header"></div>
    <div id="cal-grid"></div>
    <div id="cal-detail">
      <div id="cal-detail-date"></div>
      <div id="cal-detail-right">
        <span id="cal-detail-val"></span><span id="cal-detail-unit"></span>
        <span id="cal-detail-empty"></span>
      </div>
    </div>
  </div>
</div>

<script>
// ── 상수 ──
const TOTAL = 108;
const C = 2 * Math.PI * 110;
let audioCtx = null;

// ── 상태 ──
let count = 0;
let phase = 'idle'; // idle|ready|active|done
let elapsed = 0;
let intervalSec = 5;
let autoMode = false;
let bowCountdown = null;
let bgmOn = false;
let bgmVol = 0.18;
let bgmGain = null;
let bgmStopped = true;
let bgmScheduleTimer = null;
let bgmNextTime = 0;
let bgmMelodyIdx = 0;

let timerInterval = null;
let timerStart = null;
let bowInterval = null;
let readyInterval = null;
let readyCount = 5;

// ── 히스토리 ──
function toKey(d){ const x=d instanceof Date?d:new Date(d); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`; }
const todayKey = () => toKey(new Date());
function loadHistory(){ try{ const r=localStorage.getItem('bae108_v2'); return r?JSON.parse(r):{}; }catch{return{};} }
function saveHistory(h){ try{ localStorage.setItem('bae108_v2',JSON.stringify(h)); }catch{} }
let history = loadHistory();

// ── SVG 초기화 ──
function initSVG(){
  const C2=2*Math.PI*110;
  const pa=document.getElementById('progress-arc');
  pa.setAttribute('stroke-dasharray',C2);
  pa.setAttribute('stroke-dashoffset',C2);
  const ca=document.getElementById('cd-arc');
  ca.setAttribute('stroke-dasharray',C2);
  ca.setAttribute('stroke-dashoffset',C2);
  // 마커
  function marker(id,m){
    const a=(m/TOTAL)*2*Math.PI-Math.PI/2;
    const el=document.getElementById(id);
    el.setAttribute('x1',140+103*Math.cos(a));
    el.setAttribute('y1',140+103*Math.sin(a));
    el.setAttribute('x2',140+117*Math.cos(a));
    el.setAttribute('y2',140+117*Math.sin(a));
  }
  marker('mark36',36); marker('mark72',72);
}

// ── 오디오 ──
function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq,dur,vol,type='sine',target){
  const ctx=getCtx();
  const osc=ctx.createOscillator();
  const g=ctx.createGain();
  osc.connect(g);
  g.connect(target||ctx.destination);
  osc.type=type;
  osc.frequency.setValueAtTime(freq,ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(freq*0.85,ctx.currentTime+dur);
  g.gain.setValueAtTime(vol,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+dur);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime+dur);
}

function playBowl(milestone){
  if(milestone){ playTone(528,2.5,0.35); }
  else { playTone(432,1.2,0.2); }
}

function playBeep(){
  const ctx=getCtx();
  const osc=ctx.createOscillator();
  const g=ctx.createGain();
  osc.connect(g); g.connect(ctx.destination);
  osc.type='sine'; osc.frequency.setValueAtTime(880,ctx.currentTime);
  g.gain.setValueAtTime(0.06,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.15);
  osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.15);
}

// ── BGM ──
const NOTE={C4:261.6,D4:293.7,E4:329.6,F4:349.2,G4:392,A4:440,B4:493.9,C5:523.3,D5:587.3,E5:659.3,G3:196,A3:220,B3:246.9,Fs4:370,E3:164.8};
const MELODY=[['E5',3],['D5',3],['C5',3],['B4',3],['A4',3],['G4',3],['A4',3],['B4',3],['C5',3],['E5',3],['D5',3],['C5',3],['B4',6],['G4',3],['A4',3],['C5',3],['B4',3],['A4',3],['G4',3],['E4',3],['G4',3],['A4',3],['B4',3],['D5',3],['C5',3],['B4',3],['A4',9]];
const BASS=[['E4','G4'],['D4','F4'],['C4','E4'],['B3','D4'],['A3','C4'],['G3','B3'],['A3','C4'],['B3','D4'],['C4','E4'],['E4','G4'],['D4','F4'],['C4','E4'],['B3','D4'],['G3','B3'],['A3','C4'],['C4','E4'],['B3','D4'],['A3','C4'],['G3','B3'],['E3','G3'],['G3','B3'],['A3','C4'],['B3','D4'],['D4','Fs4'],['C4','E4'],['B3','D4'],['A3','C4']];
const BGM_BEAT=60/52;

function playPianoNote(freq,st,dur,vol,dest){
  const ctx=getCtx();
  const o1=ctx.createOscillator(),o2=ctx.createOscillator(),g=ctx.createGain();
  o1.connect(g);o2.connect(g);g.connect(dest||ctx.destination);
  o1.type='triangle';o2.type='sine';
  o1.frequency.setValueAtTime(freq,st);
  o2.frequency.setValueAtTime(freq*2.01,st);
  g.gain.setValueAtTime(0,st);
  g.gain.linearRampToValueAtTime(vol,st+0.01);
  g.gain.exponentialRampToValueAtTime(vol*0.4,st+0.3);
  g.gain.exponentialRampToValueAtTime(0.0001,st+dur);
  o1.start(st);o1.stop(st+dur);
  o2.start(st);o2.stop(st+dur);
}

function scheduleBGM(){
  if(bgmStopped) return;
  const ctx=getCtx();
  const ahead=4;
  const end=ctx.currentTime+ahead;
  while(bgmNextTime<end){
    const mi=bgmMelodyIdx%MELODY.length;
    const [note,beats]=MELODY[mi];
    const dur=beats*BGM_BEAT;
    const freq=NOTE[note]||440;
    playPianoNote(freq,bgmNextTime,dur*0.92,bgmVol*0.6,bgmGain);
    if(beats>=3){
      const bi=mi%BASS.length;
      BASS[bi].forEach((bn,i)=>{
        const bf=NOTE[bn];
        if(bf) playPianoNote(bf,bgmNextTime+i*0.01,BGM_BEAT*3*0.85,bgmVol*0.3,bgmGain);
      });
    }
    bgmNextTime+=dur;
    bgmMelodyIdx++;
  }
  bgmScheduleTimer=setTimeout(scheduleBGM,(ahead/2)*1000);
}

function startBGM(){
  bgmStopped=false;
  const ctx=getCtx();
  bgmGain=ctx.createGain();
  bgmGain.gain.setValueAtTime(0,ctx.currentTime);
  bgmGain.gain.linearRampToValueAtTime(1,ctx.currentTime+2);
  bgmGain.connect(ctx.destination);
  bgmNextTime=ctx.currentTime+0.1;
  bgmMelodyIdx=0;
  scheduleBGM();
}

function stopBGM(){
  bgmStopped=true;
  clearTimeout(bgmScheduleTimer);
  if(bgmGain){
    try{ const ctx=getCtx(); bgmGain.gain.linearRampToValueAtTime(0,ctx.currentTime+1.5); }catch{}
  }
  bgmGain=null;
}

function toggleBGM(){
  bgmOn=!bgmOn;
  const btn=document.getElementById('bgm-toggle');
  const lbl=document.getElementById('bgm-label');
  const note=btn.querySelector('.note');
  const vw=document.getElementById('vol-wrap');
  if(bgmOn){ btn.classList.add('on'); lbl.textContent='음악 ON'; note.textContent='♪'; vw.classList.add('show'); startBGM(); }
  else { btn.classList.remove('on'); lbl.textContent='음악 OFF'; note.textContent='♩'; vw.classList.remove('show'); stopBGM(); }
}

function setVolume(v){
  bgmVol=parseFloat(v);
}

// ── 타이머 ──
function startTimer(){
  timerStart=Date.now()-elapsed*1000;
  timerInterval=setInterval(()=>{
    elapsed=Math.floor((Date.now()-timerStart)/1000);
    const m=String(Math.floor(elapsed/60)).padStart(2,'0');
    const s=String(elapsed%60).padStart(2,'0');
    document.getElementById('timer-num').textContent=`${m}:${s}`;
  },1000);
  document.getElementById('timer-num').classList.add('active');
}

function stopTimer(){ clearInterval(timerInterval); }

// ── 배 카운트 ──
function triggerBow(){
  if(count>=TOTAL) return;
  count++;
  const isMilestone=count%36===0;

  // ripple
  const cw=document.getElementById('circle-wrap');
  const rr=document.createElement('div');
  rr.id='ripple-ring'; cw.appendChild(rr);
  setTimeout(()=>rr.remove(),700);

  // 숫자 pulse
  const cn=document.getElementById('count-num');
  cn.classList.add('pulse');
  setTimeout(()=>cn.classList.remove('pulse'),150);

  cn.textContent=count;
  document.getElementById('count-sub').textContent=`남은 절  ${TOTAL-count}`;

  // 진행 원호
  const offset=C*(1-count/TOTAL);
  document.getElementById('progress-arc').setAttribute('stroke-dashoffset',offset);
  document.getElementById('progress-fill').style.width=`${(count/TOTAL)*100}%`;

  if(isMilestone){
    playBowl(true);
    if(navigator.vibrate) navigator.vibrate([80,40,80,40,120]);
    const labels=['','삼분의 일','삼분의 이','원만성취'];
    const mm=document.getElementById('milestone-msg');
    mm.textContent=`— ${labels[count/36]} —`;
    mm.classList.add('show');
    setTimeout(()=>mm.classList.remove('show'),1800);
  } else {
    playBowl(false);
    if(navigator.vibrate) navigator.vibrate([30]);
  }

  if(count===TOTAL){
    phase='done';
    clearInterval(bowInterval);
    stopTimer();
    document.getElementById('timer-num').classList.add('active');
    document.getElementById('progress-arc').setAttribute('stroke','#8FA89A');
    document.getElementById('progress-fill').style.background='#8FA89A';
    document.getElementById('cd-arc').style.display='none';

    // 화면 전환
    document.getElementById('normal-view').style.display='none';
    document.getElementById('done-view').style.display='block';
    document.getElementById('circle-wrap').classList.add('done');

    // 기록 저장
    const k=todayKey();
    history[k]=(history[k]||0)+1;
    saveHistory(history);
    updateSessionText();
  }
}

// ── 준비 카운트다운 ──
function startReady(){
  phase='ready';
  readyCount=5;
  document.getElementById('settings-box').style.display='none';
  document.getElementById('normal-view').style.display='none';
  document.getElementById('ready-view').style.display='block';
  document.getElementById('ready-num').textContent=5;
  document.getElementById('reset-btn').style.display='block';

  readyInterval=setInterval(()=>{
    readyCount--;
    playBeep();
    if(readyCount<=0){
      clearInterval(readyInterval);
      startActive();
    } else {
      document.getElementById('ready-num').textContent=readyCount;
    }
  },1000);
}

function startActive(){
  phase='active';
  document.getElementById('ready-view').style.display='none';
  document.getElementById('normal-view').style.display='block';
  document.getElementById('count-num').textContent=count;
  document.getElementById('count-sub').textContent=`남은 절  ${TOTAL-count}`;
  startTimer();

  if(autoMode){
    bowCountdown=intervalSec;
    updateCDArc();
    bowInterval=setInterval(()=>{
      bowCountdown=Math.round((bowCountdown-0.5)*10)/10;
      if(bowCountdown<=3&&bowCountdown>0) playBeep();
      document.getElementById('count-sub').textContent=`${bowCountdown}초 후`;
      updateCDArc();
      if(bowCountdown<=0){
        triggerBow();
        bowCountdown=intervalSec;
      }
    },500);
  }
}

function updateCDArc(){
  const ca=document.getElementById('cd-arc');
  if(autoMode&&phase==='active'){
    ca.style.display='block';
    const offset=C*(1-(bowCountdown/intervalSec));
    ca.setAttribute('stroke-dashoffset',offset);
  } else {
    ca.style.display='none';
  }
}

// ── 핸들러 ──
function handleBow(){
  if(phase==='done'||phase==='ready') return;
  if(phase==='idle'){ startReady(); return; }
  if(!autoMode) triggerBow();
}

function handleReset(){
  clearInterval(timerInterval);
  clearInterval(bowInterval);
  clearInterval(readyInterval);
  count=0; phase='idle'; elapsed=0; bowCountdown=null;

  document.getElementById('count-num').textContent='0';
  document.getElementById('count-sub').textContent='터치하여 시작';
  document.getElementById('timer-num').textContent='00:00';
  document.getElementById('timer-num').classList.remove('active');
  document.getElementById('progress-arc').setAttribute('stroke-dashoffset',C);
  document.getElementById('progress-arc').setAttribute('stroke','#C94B3A');
  document.getElementById('progress-fill').style.width='0%';
  document.getElementById('progress-fill').style.background='#C94B3A';
  document.getElementById('cd-arc').style.display='none';
  document.getElementById('milestone-msg').classList.remove('show');
  document.getElementById('reset-btn').style.display='none';
  document.getElementById('settings-box').style.display='flex';
  document.getElementById('normal-view').style.display='block';
  document.getElementById('ready-view').style.display='none';
  document.getElementById('done-view').style.display='none';
  document.getElementById('circle-wrap').classList.remove('done');
}

// ── 모드/인터벌 ──
function setMode(auto){
  autoMode=auto;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',i===(auto?1:0)));
  document.getElementById('interval-wrap').style.display=auto?'flex':'none';
}

function changeInterval(delta){
  intervalSec=Math.round(Math.max(0.5,Math.min(120,intervalSec+delta))*10)/10;
  document.getElementById('interval-num').textContent=intervalSec;
  updatePresets();
}

function setPreset(v){
  intervalSec=v;
  document.getElementById('interval-num').textContent=v;
  updatePresets();
}

function updatePresets(){
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.toggle('active',parseFloat(b.textContent)===intervalSec));
}

// ── 탭 전환 ──
function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['counter','calendar'][i]===t));
  document.getElementById('counter-panel').style.display=t==='counter'?'flex':'none';
  document.getElementById('calendar-panel').style.display=t==='calendar'?'block':'none';
  if(t==='calendar') renderCalendar();
}

// ── 세션 텍스트 ──
function updateSessionText(){
  const s=history[todayKey()]||0;
  document.getElementById('session-text').textContent=s>0?`오늘 ${s}회 완료`:'오늘의 첫 번째 절';
}

// ── 달력 ──
let calYear=new Date().getFullYear();
let calMonth=new Date().getMonth();
let calSelected=null;

function calPrev(){
  if(calMonth===0){calYear--;calMonth=11;}else calMonth--;
  calSelected=null; renderCalendar();
}
function calNext(){
  const now=new Date();
  if(calYear===now.getFullYear()&&calMonth===now.getMonth()) return;
  if(calMonth===11){calYear++;calMonth=0;}else calMonth++;
  calSelected=null; renderCalendar();
}

function renderCalendar(){
  const now=new Date();
  const todayStr=todayKey();
  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const dayNames=['일','월','화','수','목','금','토'];
  const dayColors=['rgba(201,75,58,0.6)','#6B6B60','#6B6B60','#6B6B60','#6B6B60','#6B6B60','rgba(143,168,154,0.6)'];

  document.getElementById('cal-month-label').textContent=`${calYear}년 ${monthNames[calMonth]}`;
  const nextBtn=document.getElementById('cal-next-btn');
  nextBtn.style.opacity=(calYear===now.getFullYear()&&calMonth===now.getMonth())?'0.2':'1';

  // 통계
  const prefix=`${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  const monthDone=Object.entries(history).filter(([k,v])=>k.startsWith(prefix)&&v>0).length;
  let streak=0;const chk=new Date();
  while(true){const k=toKey(chk);if(history[k]&&history[k]>0){streak++;chk.setDate(chk.getDate()-1);}else break;if(streak>366)break;}
  const total=Object.values(history).reduce((a,b)=>a+b,0);
  document.getElementById('st-month').textContent=`${monthDone}일`;
  document.getElementById('st-streak').textContent=`${streak}일`;
  document.getElementById('st-total').textContent=`${total}회`;

  // 요일 헤더
  const hdr=document.getElementById('cal-day-header');
  hdr.innerHTML=dayNames.map((d,i)=>`<div class="cal-day-name" style="color:${dayColors[i]}">${d}</div>`).join('');

  // 날짜 그리드
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const grid=document.getElementById('cal-grid');
  let html='';
  for(let i=0;i<firstDay;i++) html+='<div></div>';
  for(let d=1;d<=daysInMonth;d++){
    const k=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cnt=history[k]||0;
    const isToday=k===todayStr;
    const isFuture=new Date(calYear,calMonth,d)>new Date(now.getFullYear(),now.getMonth(),now.getDate());
    const isSel=d===calSelected;
    let cls='cal-cell';
    if(isToday) cls+=' today';
    if(cnt>0) cls+=' done-day';
    if(isSel) cls+=' selected';
    if(isFuture) cls+=' future';
    const dots=cnt>0?`<div class="cal-dots">${Array.from({length:Math.min(cnt,3)},(_,i)=>`<div class="cal-dot" style="background:${i===0?'#8FA89A':i===1?'rgba(143,168,154,0.6)':'rgba(143,168,154,0.3)'}"></div>`).join('')}</div>`:'';
    const onclick=isFuture?'':`onclick="calSelect(${d})"`;
    html+=`<div class="${cls}" ${onclick}><span class="cal-num">${d}</span>${dots}</div>`;
  }
  grid.innerHTML=html;
  renderCalDetail();
}

function calSelect(d){
  calSelected=calSelected===d?null:d;
  renderCalendar();
}

function renderCalDetail(){
  const det=document.getElementById('cal-detail');
  if(calSelected===null){ det.style.display='none'; return; }
  det.style.display='flex';
  const k=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(calSelected).padStart(2,'0')}`;
  const cnt=history[k]||0;
  document.getElementById('cal-detail-date').textContent=`${calMonth+1}월 ${calSelected}일`;
  if(cnt>0){
    document.getElementById('cal-detail-val').textContent=cnt;
    document.getElementById('cal-detail-unit').textContent='회 완료';
    document.getElementById('cal-detail-empty').textContent='';
  } else {
    document.getElementById('cal-detail-val').textContent='';
    document.getElementById('cal-detail-unit').textContent='';
    document.getElementById('cal-detail-empty').textContent='기록 없음';
  }
}

// ── 초기화 ──
initSVG();
updateSessionText();
setPreset(5);
</script>

  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
